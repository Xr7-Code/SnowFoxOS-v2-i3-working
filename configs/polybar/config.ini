; ============================================================
;  SnowFoxOS v2.0 — Polybar Config
; ============================================================

[colors]
purple   = #9B59B6
orange   = #E67E22
bg       = #0f0f0f
bg-alt   = #1a1a1a
fg       = #e8e8e8
gray     = #b0b0b0
red      = #e05555
green    = #5faf5f

[bar/snowfox]
width = 100%
height = 32
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1
font-0 = Inter:size=10;2
font-1 = Noto Sans:size=10;2
font-2 = Noto Color Emoji:size=10;2
modules-left = menu i3 xwindow
modules-center = date
modules-right = cpu memory temperature backlight battery network pulseaudio tray
separator = " "
wm-restack = i3
override-redirect = false

; ── Fuchs Menü Button ───────────────────────────────────────
[module/menu]
type = custom/text
content = %{A1:rofi -show drun -theme ~/.config/rofi/config.rasi:}  SF  %{A}
content-foreground = ${colors.purple}
content-padding = 1

; ── i3 Workspaces ───────────────────────────────────────────
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.orange}
label-focused = %index%
label-focused-foreground = ${colors.purple}
label-focused-underline = ${colors.purple}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.orange}
label-urgent-underline = ${colors.orange}
label-urgent-padding = 2

; ── Aktives Fenster ─────────────────────────────────────────
[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.gray}
format-padding = 1

; ── Uhr ─────────────────────────────────────────────────────
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %H:%M  %a %d.%m.%Y
label = %date%
label-font = 1
label-foreground = ${colors.fg}

; ── CPU ─────────────────────────────────────────────────────
[module/cpu]
type = internal/cpu
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.gray}
label = %percentage%%
label-foreground = ${colors.gray}

; ── RAM — klick öffnet btop ─────────────────────────────────
[module/memory]
type = internal/memory
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.gray}
label = %percentage_used%%
label-foreground = ${colors.gray}
click-left = kitty --title btop -e btop

; ── Temperatur ──────────────────────────────────────────────
[module/temperature]
type = internal/temperature
interval = 10
thermal-zone = 0
warn-temperature = 80
format = <ramp> <label>
format-warn = <ramp> <label-warn>
label = %temperature-c%°
label-warn = %temperature-c%°
label-warn-foreground = ${colors.red}
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.gray}

; ── Helligkeit ──────────────────────────────────────────────
[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
format = <ramp> <label>
label = %percentage%%
label-foreground = ${colors.gray}
ramp-0 = 
ramp-1 = 
ramp-2 = 
ramp-foreground = ${colors.gray}

; ── Akku — auto-detect ──────────────────────────────────────
[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
poll-interval = 5
full-at = 99
low-at = 15
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <ramp-capacity> <label-low>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full =  voll
label-low = %percentage%%
label-full-foreground = ${colors.green}
label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.gray}
label-low-foreground = ${colors.red}
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.gray}
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

; ── Netzwerk ────────────────────────────────────────────────
[module/network]
type = internal/network
interface-type = wireless
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.gray}
label-connected = %essid%
label-connected-foreground = ${colors.gray}
label-disconnected = " Getrennt"
label-disconnected-foreground = ${colors.red}
click-left = ~/.config/snowfox-network.sh

; ── Lautstärke ──────────────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.gray}
label-muted =  stumm
label-muted-foreground = ${colors.red}
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.gray}
click-right = pavucontrol
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

; ── System Tray ─────────────────────────────────────────────
[module/tray]
type = internal/tray
tray-size = 18
tray-padding = 4
tray-background = ${colors.bg}
